<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Empleador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../recursos/style.css">
    <link rel="icon" href="../recursos/content.png">
</head>

<body>
    <div id="navbar"></div>

    <div id="admin-panel-container">

        <h1>Panel Empleador</h1>

        <div id="sucursales">
            <div class="table-container">
                <h1>Mis Sucursales</h1>
                <button class="btn-add" id="btn-agregar-sucursal">+ Agregar Sucursal</button>

                <table class="table" id="tablasSucursales">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Dirección</th>
                            <th>Teléfono</th>
                            <th>Categoría</th>
                            <th>Horario</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="sucursalesBody"></tbody>
                </table>
            </div>
        </div>

        <div id="servicios">
            <div class="table-container">
                <h1>Servicios</h1>

                <div class="filtrar">
                    <label for="filtro-sucursal-servicios">Sucursal</label>
                    <select id="filtro-sucursal-servicios">
                        <option value="">Seleccioná una sucursal</option>
                    </select>
                    <button class="btn-add" id="btn-agregar-servicio" style="margin-bottom:0">+ Agregar
                        Servicio</button>
                </div>

                <table class="table" id="tablasServicios">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Duración</th>
                            <th>Precio</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="serviciosBody"></tbody>
                </table>
            </div>
        </div>

        <div id="turnos">
            <div class="table-container">
                <h1>Turnos</h1>

                <div class="filtrar">
                    <label for="filtro-sucursal-turnos">Sucursal</label>
                    <select id="filtro-sucursal-turnos">
                        <option value="">Seleccioná una sucursal</option>
                    </select>
                </div>

                <table class="table" id="tablasTurnos">
                    <thead>
                        <tr>
                            <th>Servicio</th>
                            <th>Cliente</th>
                            <th>Empleado</th>
                            <th>Fecha</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="turnosBody"></tbody>
                </table>
            </div>
        </div>

        <div id="empleados">
            <div class="table-container">
                <h1>Empleados</h1>

                <div class="filtrar">
                    <label for="filtro-sucursal-empleados">Sucursal</label>
                    <select id="filtro-sucursal-empleados">
                        <option value="">Seleccioná una sucursal</option>
                    </select>
                </div>

                <table class="table" id="tablasEmpleados">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Apellido</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="empleadosBody"></tbody>
                </table>

                <div class="filtrar" style="margin-top: 16px;">
                    <p style="font-size:11px; font-family:var(--font-mono); color:var(--dk-text-3); margin:0 8px 0 0;">
                        Agregar empleado por email</p>
                    <input type="email" class="form-control" id="input-email-empleado" placeholder="email@ejemplo.com"
                        style="max-width:260px; height:34px; font-size:12px;">
                    <button id="btn-agregar-empleado">Agregar</button>
                </div>
            </div>
        </div>

    </div>

    <script src="empleador.js"></script>
    <script src="../recursos/script.js"></script>
</body>

</html>
