<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucursal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="recursos/style.css">


</head>

<body>


    <div id="navbar"></div>


    <div class="sucursal-container">

        <div id="container-info-sucursal">

            <button id="btn-volver">Volver</button>
            
            <div class="principal-imagen-sucursal">

                <img src="https://cdn-imgix.headout.com/tour/19364/TOUR-IMAGE/a0f87f7e-434d-4c3c-9584-f7ee351d5f64-10432-dubai-img-worlds-of-adventure---uae-resident-offer-01.jpg"
                    alt="">
            </div>


            <div class="info-sucursal">
                <h3 id="nombre-sucursal">Nombre</h3>
                <p id="categoria-sucursal">Categoria: </p>
                <p id="descripcion-sucursal">Descripcion: </p>
                <p id="direccion-sucursal">Direccion: </p>
                <p id="horario-sucursal">Horario: </p>
                <p id="telefono-sucursal">Telefono: </p>
                <div class="botones-sucursal">
                    <button id="btn-reservar">Reservar Servicio</button>
                </div>
                
            </div>
            


            <div class="interior-imagenes-sucursal">
                <a
                    href="https://cdn-imgix.headout.com/tour/19364/TOUR-IMAGE/a0f87f7e-434d-4c3c-9584-f7ee351d5f64-10432-dubai-img-worlds-of-adventure---uae-resident-offer-01.jpg">

                    <img src="https://cdn-imgix.headout.com/tour/19364/TOUR-IMAGE/a0f87f7e-434d-4c3c-9584-f7ee351d5f64-10432-dubai-img-worlds-of-adventure---uae-resident-offer-01.jpg"
                        alt="">
                </a>




            </div>
            <div class="acciones-sucursal">

                <button id="btn-contactar">Contactar</button>
                <button id="btn-contactar">Denunciar</button>
            </div>

        </div>



    </div>



    <script src="recursos/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
