<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../recursos/style.css">
    <link rel="icon" href="../recursos/content.png">

</head>

<body>
    <div id="navbar"></div>
    <div id="admin-panel-container">

        <h1>Admin Panel</h1>

        <div id="usuarios">
            <div class="table-container">
                <h1>Gestionar Usuarios</h1>

                <table class="table" id="tablasUsuarios">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Apellido</th>
                            <th>Email</th>
                            <th>Rol</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="usuariosBody">
                    </tbody>
                </table>
            </div>

        </div>



        <div id="servicios">




            <div class="table-container">
                <h1>Gestionar Servicios</h1>

                <table class="table" id="tablasServicios">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Duración</th>
                            <th>Precio</th>
                        </tr>
                    </thead>
                    <tbody id="serviciosBody">
                    </tbody>
                </table>
            </div>
        </div>

        <div id="sucursales">
            <div class="table-container">
                <h1>Gestionar Sucursales</h1>
                <button class="btn-add">Agregar Sucursal</button>

                <table class="table" id="tablasSucursales">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Dirección</th>
                            <th>Teléfono</th>
                            <th>Categoría</th>
                            <th>Horario</th>
                        </tr>
                    </thead>
                    <tbody id="sucursalesBody">
                    </tbody>
                </table>
            </div>
        </div>

    </div>

<script src="admin.js"></script>
    <script src="../recursos/script.js"></script>

</body>

</html>
