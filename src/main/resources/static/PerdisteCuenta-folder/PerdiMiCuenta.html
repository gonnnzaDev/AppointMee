<!DOCTYPE html>
<html lang="en">

<head>

<body>

    <div class="perdiMiCuenta-container">
        <div class="perdiMiCuenta-info">

            <h1>Olvide mi Contraseña!</h1>

            <p>Email</p>
            <div class="input-group">
                <input type="text" class="form-control" placeholder="Email" id="email-denuncia-input">
            </div>

            <p>Contraseña</p>
            <div class="input-group">
                <input type="text" class="form-control" placeholder="Contraseña" id="pass-denuncia-input">

            <div class="input-group">

            </div>

            <div class="perdiMiCuenta-botones">
                <button class="btn-cancel" id="cancelar" data-no-cooldown>Cancelar</button>

            </div>
        </div>
