<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="../recursos/style.css">
    <link rel="icon" href="../recursos/content.png">
</head>

<body>
    <div id="navbar"></div>
    <div id="admin-panel-container">

        <h1>Admin Panel</h1>

        <div id="usuarios">
            <div class="table-container">
                <h1>Gestionar Usuarios</h1>
                <table class="table" id="tablasUsuarios">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Apellido</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="usuariosBody"></tbody>
                </table>
            </div>
        </div>

      
        <div id="sucursales">
            <div class="table-container">
                <h1>Gestionar Sucursales</h1>
                <table class="table" id="tablasSucursales">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Categoria</th>
                            <th>Puntuacion</th>
                            <th>Cantidad De Puntuaciones</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="sucursalesBody"></tbody>
                </table>
            </div>
        </div>

    </div>



    <script type="module" src="admin.js"></script>
    <script src="../recursos/script.js"></script>
</body>

</html>
