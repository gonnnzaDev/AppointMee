<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../recursos/style.css">
    <link rel="icon" href="../recursos/content.png">
</head>

<body>

    <div id="navbar"></div>

    <div id="admin-panel-container" class="container mt-4">

        <h1 class="mb-4">Admin Panel</h1>

        <div class="mb-5">

            <h2>Gestionar Usuarios</h2>

            <input
                type="text"
                id="buscarUsuario"
                class="form-control mb-3"
                placeholder="Buscar usuario...">

            <div class="table-container">

                <table class="table table-striped">

                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Apellido</th>
                            <th>Email</th>
                            <th>Rol</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>

                    <tbody id="usuariosBody"></tbody>

                </table>

            </div>

        </div>

        <div>

            <h2>Gestionar Sucursales</h2>

            <input
                type="text"
                id="buscarSucursal"
                class="form-control mb-3"
                placeholder="Buscar sucursal...">

            <div class="table-container">

                <table class="table table-striped">

                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Categoría</th>
                            <th>Puntuación</th>
                            <th>Cantidad Puntuaciones</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>

                    <tbody id="sucursalesBody"></tbody>

                </table>

            </div>

        </div>

    </div>
<div class="modal fade" id="usuarioModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Detalle Usuario</h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>
            </div>

            <div class="modal-body" id="usuarioModalBody"></div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./admin.js"></script>
    <script src="../recursos/script.js"></script>

</body>

</html>
