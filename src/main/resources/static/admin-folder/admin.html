<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../recursos/style.css">
    <link rel="icon" href="../recursos/content.png">
</head>

<body>
    <div id="navbar"></div>
    <div id="admin-panel-container">

        <h1>Admin Panel</h1>

        <div id="usuarios">
            <div class="table-container">
                <h1>Gestionar Usuarios</h1>
                <table class="table" id="tablasUsuarios">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Apellido</th>
                            <th>Email</th>
                            <th>Rol</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="usuariosBody"></tbody>
                </table>
            </div>
        </div>

        <div id="servicios">
            <div class="table-container">
                <h1>Gestionar Servicios</h1>
                <table class="table" id="tablasServicios">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Duración</th>
                            <th>Precio</th>
                        </tr>
                    </thead>
                    <tbody id="serviciosBody"></tbody>
                </table>
            </div>
        </div>

        <div id="sucursales">
            <div class="table-container">
                <h1>Gestionar Sucursales</h1>
                <table class="table" id="tablasSucursales">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Categoria</th>
                            <th>Puntuacion</th>
                            <th>Cantidad De Puntuaciones</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="sucursalesBody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- ===== MODAL DETALLE USUARIO ===== -->
    <div class="modal fade" id="modalDetalleUsuario" tabindex="-1" aria-labelledby="modalDetalleUsuarioLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalDetalleUsuarioLabel">Detalle de Usuario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body" id="modalDetalleUsuarioBody">
                    <div class="text-center py-4">
                        <div class="spinner-border" role="status"><span class="visually-hidden">Cargando...</span></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>
    <!-- ===== FIN MODAL USUARIO ===== -->

    <script type="module" src="admin.js"></script>
    <script src="../recursos/script.js"></script>
    <!-- Bootstrap JS (necesario para el modal) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmB8t84hBOHE+rGzHEZlHRUDQ7a" crossorigin="anonymous"></script>
</body>

</html>
